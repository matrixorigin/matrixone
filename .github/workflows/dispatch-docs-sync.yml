name: Dispatch Docs Sync

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch docs sync event
        env:
          GH_TOKEN: ${{ secrets.DOCS_SYNC_DISPATCH_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "Missing secret DOCS_SYNC_DISPATCH_TOKEN." >&2
            echo "Configure a fine-grained PAT with access to ULookup/docs-sync-agent:" >&2
            echo "  Contents: read, Actions: read and write" >&2
            exit 3
          fi
          echo "::add-mask::$GH_TOKEN"
          gh api repos/ULookup/docs-sync-agent/dispatches \
            -X POST \
            -f event_type=matrixone_tag_released \
            -f client_payload[tag]="$TAG_NAME"
