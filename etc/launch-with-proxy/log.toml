# service node type, [DN|CN|LOG]
service-type = "LOG"
data-dir = "./mo-data"

[log]
level = "info"
format = "console"
max-size = 512

[[fileservice]]
name = "LOCAL"
backend = "DISK-V2"
data-dir = "mo-data/local2"

[[fileservice]]
name = "SHARED"
backend = "DISK-V2"
data-dir = "mo-data/shared2"

[fileservice.cache]
memory-capacity = "512MB"
disk-capacity = "8GB"
disk-path = "mo-data/file-service-cache"

[[fileservice]]
name = "ETL"
backend = "DISK-ETL"

[observability]
status-port = 7001
