services:
  minio:
    image: minio/minio:RELEASE.2023-11-01T18-37-25Z
    container_name: mo-minio-local
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      # 挂载本地目录，使用用户权限
      - ./mo-data/minio-data:/data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server --console-address ":9001" /data
    healthcheck:
      test: timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9001' || exit 1
      interval: 1s
      timeout: 5s
      retries: 10
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    restart: unless-stopped
    networks:
      - mo-minio-network

  nessie:
    image: ghcr.io/projectnessie/nessie:latest
    container_name: mo-nessie-local
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    ports:
      - "19120:19120"
      - "19121:19121"
    environment:
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_HTTP_PORT: 19120
      QUARKUS_MANAGEMENT_PORT: 19121
      NESSIE_CATALOG_DEFAULT_WAREHOUSE: warehouse
      NESSIE_CATALOG_WAREHOUSES_WAREHOUSE_LOCATION: s3://mo-iceberg/warehouse
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ENDPOINT: http://minio:9000
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_EXTERNAL_ENDPOINT: http://127.0.0.1:9000
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_REGION: us-east-1
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_AUTH_TYPE: STATIC
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ACCESS_KEY: urn:nessie-secret:quarkus:s3default
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_PATH_STYLE_ACCESS: "true"
      S3DEFAULT_NAME: minio
      S3DEFAULT_SECRET: minio123
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      AWS_REGION: us-east-1
    healthcheck:
      test:
        - CMD-SHELL
        - timeout 5s bash -c 'exec 3<>/dev/tcp/127.0.0.1/19120; printf "GET /iceberg/v1/config HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3; grep -q "200 OK" <&3' || exit 1
      interval: 1s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    networks:
      - mo-minio-network

  # Create default buckets via mc client
  createbuckets:
    image: minio/mc:RELEASE.2023-10-30T18-43-32Z
    container_name: mo-minio-createbuckets
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minio minio123;
      /usr/bin/mc mb myminio/mo-test || true;
      /usr/bin/mc mb myminio/mo-iceberg || true;
      /usr/bin/mc anonymous set public myminio/mo-test;
      /usr/bin/mc anonymous set public myminio/mo-iceberg;
      exit 0;
      "
    networks:
      - mo-minio-network
    restart: "no"

networks:
  mo-minio-network:
    driver: bridge
