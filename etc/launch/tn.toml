service-type = "TN"
data-dir = "./mo-data"

# Opt into the checksum-free DISK-V2 backend. The cluster-wide default remains
# DISK (CRC-framed) for backward compatibility with existing data dirs; this
# config explicitly selects DISK-V2 for a fresh deployment.
[[fileservice]]
name = "LOCAL"
backend = "DISK-V2"
data-dir = "./mo-data/local2"

[[fileservice]]
name = "SHARED"
backend = "DISK-V2"
data-dir = "./mo-data/shared2"

[log]
level = "info"

[tn]
uuid = "dd4dccb4-4d3c-41f8-b482-5251dc7a41bf"
port-base = 19000

[malloc]
check-fraction = 65536
enable-metrics = true

[observability]
disableMetric = false
enable-metric-to-prom = true
status-port = 7001
